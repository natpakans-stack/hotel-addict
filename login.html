<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ — Hotel Addict</title>
    <meta name="description" content="เข้าสู่ระบบ Hotel Addict เพื่อจัดการการจองและดูโปรโมชั่นพิเศษของคุณ">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <!-- Design Tokens & Global Styles -->
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* === LOGIN PAGE — MODAL STYLE === */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1A6B4A 0%, #2D8B65 50%, #1A6B4A 100%);
            padding: var(--space-lg);
        }

        .login-card {
            position: relative;
            width: 100%;
            max-width: 440px;
            background: var(--bg-white);
            border-radius: var(--radius-xl);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* Header banner */
        .login-card__banner {
            position: relative;
            height: 140px;
            background: linear-gradient(135deg, #1A6B4A, #2D8B65);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-card__banner-pattern {
            position: absolute;
            inset: 0;
            opacity: 0.1;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .login-card__logo {
            position: relative;
            z-index: 1;
            font-family: var(--font-heading);
            font-size: 28px;
            font-weight: var(--fw-bold);
            color: #fff;
            text-decoration: none;
        }

        .login-card__logo .gold {
            color: var(--color-gold-light);
        }

        /* Close button */
        .login-card__close {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 2;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.2);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition-fast);
        }

        .login-card__close:hover {
            background: rgba(255,255,255,0.3);
        }

        .login-card__close .material-symbols-outlined {
            font-size: 20px;
        }

        /* Body */
        .login-card__body {
            padding: 28px 32px 32px;
        }

        .login-card__title {
            font-family: var(--font-heading);
            font-size: 22px;
            font-weight: var(--fw-bold);
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 8px;
        }

        .login-card__benefits {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 24px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .login-card__benefit {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .login-card__benefit .material-symbols-outlined {
            font-size: 16px;
            color: var(--color-gold);
        }

        /* CTA primary */
        .login-cta {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-md);
            background: var(--color-gold-dark);
            color: #fff;
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: var(--fw-bold);
            cursor: pointer;
            text-decoration: none;
            transition: background var(--transition-fast);
            margin-bottom: 12px;
        }

        .login-cta:hover {
            background: var(--color-gold);
        }

        /* Social buttons */
        .login-social {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }

        .login-social__btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            font-size: 15px;
            font-weight: var(--fw-semibold);
            cursor: pointer;
            transition: opacity var(--transition-fast);
            text-decoration: none;
        }

        .login-social__btn:hover {
            opacity: 0.9;
        }

        .login-social__btn svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .login-social__btn--google {
            background: #fff;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .login-social__btn--google:hover {
            background: #F8F8F9;
            opacity: 1;
        }

        .login-social__btn--facebook {
            background: #1877F2;
            border: none;
            color: #fff;
        }

        .login-social__btn--line {
            background: #06C755;
            border: none;
            color: #fff;
        }

        .login-social__btn--apple {
            background: #000;
            border: none;
            color: #fff;
        }

        /* Terms */
        .login-terms {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.6;
        }

        .login-terms a {
            color: var(--color-gold-dark);
            font-weight: var(--fw-semibold);
        }

        /* Animation */
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .login-card {
            animation: scaleIn 0.35s ease both;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-page {
                padding: 0;
                align-items: stretch;
            }

            .login-card {
                max-width: 100%;
                min-height: 100vh;
                border-radius: 0;
                box-shadow: none;
            }

            .login-card__banner {
                height: 120px;
            }

            .login-card__body {
                padding: 24px 20px 32px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

<main class="login-page">

    <div class="login-card">
        <!-- Banner -->
        <div class="login-card__banner">
            <div class="login-card__banner-pattern" aria-hidden="true"></div>
            <a href="index.html" class="login-card__logo">Hotel <span class="gold">Addict</span></a>
            <a href="javascript:history.back()" class="login-card__close" aria-label="ปิด">
                <span class="material-symbols-outlined">close</span>
            </a>
        </div>

        <!-- Body -->
        <div class="login-card__body">
            <h1 class="login-card__title">เข้าสู่ระบบ/สมัครสมาชิก</h1>

            <div class="login-card__benefits">
                <span class="login-card__benefit">
                    <span class="material-symbols-outlined">verified</span>
                    สิทธิพิเศษสมาชิก
                </span>
                <span class="login-card__benefit">
                    <span class="material-symbols-outlined">sell</span>
                    รับส่วนลดสุดคุ้ม
                </span>
            </div>

            <!-- Primary CTA -->
            <button class="login-cta" onclick="alert('เปิดหน้ากรอกอีเมล/เบอร์มือถือ')">
                อีเมลหรือเบอร์มือถือ
            </button>

            <!-- Social Login -->
            <div class="login-social">
                <button class="login-social__btn login-social__btn--google">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Google
                </button>

                <button class="login-social__btn login-social__btn--facebook">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12S0 5.446 0 12.073c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#fff"/>
                    </svg>
                    Facebook
                </button>

                <button class="login-social__btn login-social__btn--line">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314" fill="#fff"/>
                    </svg>
                    LINE
                </button>

                <button class="login-social__btn login-social__btn--apple">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.32 2.32-2.14 4.27-3.74 4.25z" fill="#fff"/>
                    </svg>
                    Apple
                </button>
            </div>

            <!-- Terms -->
            <p class="login-terms">
                เมื่อเข้าสู่ระบบ/สมัครสมาชิก จะถือว่าคุณได้อ่านและยอมรับ<br>
                <a href="#">นโยบายความเป็นส่วนตัว</a> และ <a href="#">ข้อตกลงและเงื่อนไข</a> แล้ว
            </p>
        </div>
    </div>

</main>

</body>
</html>
